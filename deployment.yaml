apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: httpd-deploy
    environment: dev
  name: httpd-deploy
spec:
  replicas: 1
  selector: 
    matchLabels:
      app: httpd-deploy
  template:
    metadata:
      labels:        
        app: httpd-deploy
        environment: dev
    spec:
      containers:
      - image: httpd
        name: httpd
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: "/health"
            port: 8080
        livenessProbe:
          httpGet:
            path: "/health"
            port: 8080
        env:
        - name: environment
          value: development
        - name: project
          value: Evelution
        
       
